<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Orbit Runner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #07070f; }
  body { touch-action: none; -webkit-user-select: none; user-select: none; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function () {
  'use strict';
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');
  var TAU = Math.PI * 2;

  var W = 0, H = 0, cx = 0, cy = 0, R = 0, dpr = 1;
  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cx = W / 2; cy = H / 2;
    R = Math.min(W, H) * 0.32;
  }
  window.addEventListener('resize', resize);
  resize();

  // ---- state ----
  var mode = 'menu';           // 'menu' | 'play' | 'over'
  var theta = -Math.PI / 2;    // ship angle
  var dir = 1;                 // orbit direction
  var speed = 1.7;             // rad/s
  var elapsed = 0;
  var score = 0, best = 0;
  var hazards = [];            // {a, span, phase:'warn'|'live', t, life}
  var sparks = [];             // {a, pulse}
  var particles = [];          // {x,y,vx,vy,life,max,color,r}
  var trail = [];              // {x,y,life}
  var shake = 0;
  var overAt = 0;
  var hazardTimer = 0, sparkTimer = 0;

  function angDist(a, b) {
    var d = Math.abs(((a - b) % TAU + TAU) % TAU);
    return d > Math.PI ? TAU - d : d;
  }
  function shipXY(ang) {
    return { x: cx + Math.cos(ang) * R, y: cy + Math.sin(ang) * R };
  }
  function rand(lo, hi) { return lo + Math.random() * (hi - lo); }

  function freeAngle(minFromShip, span) {
    // find a ring angle at least minFromShip from the ship and clear of hazards
    for (var tries = 0; tries < 40; tries++) {
      var a = Math.random() * TAU;
      if (angDist(a, theta) < minFromShip + span / 2) continue;
      var clear = true;
      for (var i = 0; i < hazards.length; i++) {
        if (angDist(a, hazards[i].a) < hazards[i].span / 2 + span / 2 + 0.25) { clear = false; break; }
      }
      if (clear) return a;
    }
    return null;
  }

  function spawnHazard() {
    var span = rand(0.38, 0.62);
    var a = freeAngle(0.9, span);
    if (a === null) return;
    hazards.push({ a: a, span: span, phase: 'warn', t: 0, life: rand(4.5, 7) });
  }
  function spawnSpark() {
    if (sparks.length >= 3) return;
    var a = freeAngle(0.5, 0.2);
    if (a === null) return;
    sparks.push({ a: a, pulse: Math.random() * TAU });
  }

  function burst(x, y, color, n, spd) {
    for (var i = 0; i < n; i++) {
      var ang = Math.random() * TAU, v = rand(0.3, 1) * spd;
      particles.push({
        x: x, y: y,
        vx: Math.cos(ang) * v, vy: Math.sin(ang) * v,
        life: 0, max: rand(0.4, 0.9),
        color: color, r: rand(1.5, 3.5)
      });
    }
  }

  function reset() {
    mode = 'play';
    theta = -Math.PI / 2; dir = 1; speed = 1.7;
    elapsed = 0; score = 0;
    hazards = []; sparks = []; trail = [];
    hazardTimer = 1.2; sparkTimer = 0.4;
  }

  function die() {
    mode = 'over';
    overAt = elapsed;
    if (score > best) best = score;
    shake = 14;
    var p = shipXY(theta);
    burst(p.x, p.y, '#ff5470', 40, 220);
  }

  function onTap(e) {
    e.preventDefault();
    if (mode === 'menu') { reset(); return; }
    if (mode === 'play') {
      dir *= -1;
      var p = shipXY(theta);
      burst(p.x, p.y, '#6ee7ff', 6, 80);
      return;
    }
    if (mode === 'over' && elapsed - overAt > 0.6) reset();
  }
  window.addEventListener('pointerdown', onTap);
  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space' || e.code === 'Enter') onTap(e);
  });

  // ---- update ----
  function update(dt) {
    elapsed += dt;
    if (shake > 0) shake = Math.max(0, shake - dt * 30);

    // particles always update
    for (var i = particles.length - 1; i >= 0; i--) {
      var pt = particles[i];
      pt.life += dt;
      if (pt.life >= pt.max) { particles.splice(i, 1); continue; }
      pt.x += pt.vx * dt; pt.y += pt.vy * dt;
      pt.vx *= 0.98; pt.vy *= 0.98;
    }
    for (var t = trail.length - 1; t >= 0; t--) {
      trail[t].life -= dt * 2.2;
      if (trail[t].life <= 0) trail.splice(t, 1);
    }

    if (mode !== 'play') return;

    speed = 1.7 + Math.min(2.1, elapsed * 0.028 + score * 0.045);
    theta = ((theta + dir * speed * dt) % TAU + TAU) % TAU;

    var ship = shipXY(theta);
    trail.push({ x: ship.x, y: ship.y, life: 1 });
    if (trail.length > 40) trail.shift();

    // spawn cadence tightens as score grows
    hazardTimer -= dt;
    if (hazardTimer <= 0) {
      spawnHazard();
      hazardTimer = Math.max(0.9, 2.2 - score * 0.06 - elapsed * 0.01);
    }
    sparkTimer -= dt;
    if (sparkTimer <= 0) { spawnSpark(); sparkTimer = rand(0.8, 1.6); }

    // hazards
    for (var h = hazards.length - 1; h >= 0; h--) {
      var hz = hazards[h];
      hz.t += dt;
      if (hz.phase === 'warn' && hz.t >= 0.85) { hz.phase = 'live'; hz.t = 0; }
      else if (hz.phase === 'live') {
        if (hz.t >= hz.life) { hazards.splice(h, 1); continue; }
        if (angDist(theta, hz.a) < hz.span / 2 + 0.045) { die(); return; }
      }
    }

    // sparks
    for (var s = sparks.length - 1; s >= 0; s--) {
      sparks[s].pulse += dt * 5;
      if (angDist(theta, sparks[s].a) < 0.11) {
        var sp = shipXY(sparks[s].a);
        burst(sp.x, sp.y, '#ffd166', 14, 130);
        sparks.splice(s, 1);
        score++;
      }
    }
  }

  // ---- draw ----
  function arcPath(a, span, r) {
    ctx.beginPath();
    ctx.arc(cx, cy, r, a - span / 2, a + span / 2);
  }

  function draw() {
    // background
    var g = ctx.createRadialGradient(cx, cy, R * 0.2, cx, cy, Math.max(W, H) * 0.75);
    g.addColorStop(0, '#101024');
    g.addColorStop(1, '#050509');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    if (shake > 0) ctx.translate(rand(-shake, shake) * 0.5, rand(-shake, shake) * 0.5);

    // ring
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, TAU);
    ctx.strokeStyle = 'rgba(110,231,255,0.18)';
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, TAU);
    ctx.strokeStyle = 'rgba(110,231,255,0.05)';
    ctx.lineWidth = 14;
    ctx.stroke();

    // hazards
    for (var h = 0; h < hazards.length; h++) {
      var hz = hazards[h];
      if (hz.phase === 'warn') {
        var blink = 0.25 + 0.35 * Math.abs(Math.sin(hz.t * 14));
        arcPath(hz.a, hz.span, R);
        ctx.strokeStyle = 'rgba(255,84,112,' + blink.toFixed(3) + ')';
        ctx.lineWidth = 6;
        ctx.setLineDash([6, 8]);
        ctx.stroke();
        ctx.setLineDash([]);
      } else {
        var fade = Math.min(1, (hz.life - hz.t) / 0.5);
        ctx.save();
        ctx.shadowColor = '#ff5470';
        ctx.shadowBlur = 18;
        arcPath(hz.a, hz.span, R);
        ctx.strokeStyle = 'rgba(255,84,112,' + (0.95 * fade).toFixed(3) + ')';
        ctx.lineWidth = 9;
        ctx.lineCap = 'round';
        ctx.stroke();
        ctx.restore();
      }
    }

    // sparks
    for (var s = 0; s < sparks.length; s++) {
      var sp = shipXY(sparks[s].a);
      var pr = 5 + Math.sin(sparks[s].pulse) * 1.6;
      ctx.save();
      ctx.shadowColor = '#ffd166';
      ctx.shadowBlur = 16;
      ctx.beginPath();
      ctx.arc(sp.x, sp.y, pr, 0, TAU);
      ctx.fillStyle = '#ffd166';
      ctx.fill();
      ctx.restore();
    }

    // trail
    for (var t = 0; t < trail.length; t++) {
      var tr = trail[t];
      ctx.beginPath();
      ctx.arc(tr.x, tr.y, 3.5 * tr.life, 0, TAU);
      ctx.fillStyle = 'rgba(110,231,255,' + (0.25 * tr.life).toFixed(3) + ')';
      ctx.fill();
    }

    // ship
    if (mode !== 'over') {
      var p = shipXY(theta);
      ctx.save();
      ctx.shadowColor = '#6ee7ff';
      ctx.shadowBlur = 20;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 7, 0, TAU);
      ctx.fillStyle = '#e6fbff';
      ctx.fill();
      ctx.restore();
    }

    // particles
    for (var i = 0; i < particles.length; i++) {
      var pt = particles[i];
      var a = 1 - pt.life / pt.max;
      ctx.globalAlpha = a;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, pt.r * a, 0, TAU);
      ctx.fillStyle = pt.color;
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();

    // HUD
    ctx.textAlign = 'center';
    if (mode === 'play') {
      ctx.fillStyle = '#e6fbff';
      ctx.font = '700 44px "Segoe UI", system-ui, sans-serif';
      ctx.fillText(score, cx, cy + 15);
      ctx.fillStyle = 'rgba(230,251,255,0.35)';
      ctx.font = '600 14px "Segoe UI", system-ui, sans-serif';
      ctx.fillText('BEST ' + best, cx, cy + 42);
    } else if (mode === 'menu') {
      ctx.fillStyle = '#e6fbff';
      ctx.font = '800 34px "Segoe UI", system-ui, sans-serif';
      ctx.fillText('ORBIT RUNNER', cx, cy - 8);
      ctx.fillStyle = '#ffd166';
      ctx.font = '600 16px "Segoe UI", system-ui, sans-serif';
      ctx.fillText('Collect gold sparks. Dodge red arcs.', cx, cy + 22);
      ctx.fillStyle = 'rgba(230,251,255,' + (0.5 + 0.4 * Math.sin(elapsed * 3)).toFixed(3) + ')';
      ctx.font = '600 15px "Segoe UI", system-ui, sans-serif';
      ctx.fillText('Tap to reverse direction — tap to start', cx, cy + 50);
    } else {
      ctx.fillStyle = '#ff5470';
      ctx.font = '800 30px "Segoe UI", system-ui, sans-serif';
      ctx.fillText('CRASHED', cx, cy - 20);
      ctx.fillStyle = '#e6fbff';
      ctx.font = '700 40px "Segoe UI", system-ui, sans-serif';
      ctx.fillText(score, cx, cy + 22);
      ctx.fillStyle = 'rgba(230,251,255,0.5)';
      ctx.font = '600 15px "Segoe UI", system-ui, sans-serif';
      ctx.fillText('BEST ' + best, cx, cy + 48);
      if (elapsed - overAt > 0.6) {
        ctx.fillStyle = 'rgba(230,251,255,' + (0.5 + 0.4 * Math.sin(elapsed * 3)).toFixed(3) + ')';
        ctx.fillText('Tap to try again', cx, cy + 80);
      }
    }
  }

  // ---- loop ----
  var last = performance.now();
  function frame(now) {
    var dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    update(dt); // elapsed ticks inside update in every mode
    draw();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
